<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 유튜브 댓글 AI 여론 분석 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .prose h2 { font-size: 1.4rem; font-weight: 700; color: #1e3a8a; margin-top: 1.5rem; margin-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.25rem;}
        .prose h3 { font-size: 1.1rem; font-weight: 600; color: #2563eb; margin-top: 1.25rem; margin-bottom: 0.25rem;}
        .prose ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; }
        .prose li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-indigo-950">📊 유튜브 댓글 AI 종합 분석 플랫폼</h1>
            <p class="text-slate-500 mt-2 font-medium"유튜브 URL를 입력하면 AI가 분석 및 요약을 시작합니다.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Gemini API Key</label>
                    <input type="password" id="apiKey" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="AIzaSy... 형태로 입력">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">유튜브 영상 URL</label>
                    <input type="text" id="videoUrl" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="https://www.youtube.com/watch?v=...">
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mt-6 pt-4 border-t border-slate-100">
                <div class="flex items-center space-x-6">
                    <span class="text-sm font-semibold text-slate-700">댓글 정렬 필터:</span>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="sortBy" value="0" checked class="text-indigo-600 focus:ring-indigo-500 h-4 w-4">
                        <span class="ml-2 text-sm font-medium">👍인기순 (기본)</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="sortBy" value="1" class="text-indigo-600 focus:ring-indigo-500 h-4 w-4">
                        <span class="ml-2 text-sm font-medium">⏰최신순 (실시간)</span>
                    </label>
                </div>
                <button onclick="runAnalysis()" id="btnSubmit" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-8 rounded-lg transition shadow-sm">
                    여론 분석 시작
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="text-slate-600 mt-4 font-semibold text-sm">AI가 실시간 브라우징을 활용해 데이터를 요약 분석 중입니다. 기다려 주세요!</p>
        </div>

        <div id="resultDashboard" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="border-b pb-4 mb-5">
                    <span class="bg-red-100 text-red-700 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider" id="resChannel">Channel</span>
                    <h2 class="text-xl font-bold text-slate-900 mt-2.5" id="resTitle">Video Title</h2>
                </div>
                <div id="analysisReport" class="prose max-w-none text-slate-700 leading-relaxed"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-start h-fit">
                <h3 class="text-md font-bold text-slate-800 mb-6 self-start w-full border-b pb-2 flex items-center">
                    <span class="mr-2">🎭</span> 여론 감정 분포 지수
                </h3>
                <div class="w-full max-w-[220px] aspect-square">
                    <canvas id="emotionChart"></canvas>
                </div>
                <div class="mt-6 space-y-3 w-full text-sm font-semibold">
                    <div class="flex justify-between p-2 bg-emerald-50 rounded-lg text-emerald-700">
                        <span>😀 긍정적 피드백</span><span id="txtPos">0%</span>
                    </div>
                    <div class="flex justify-between p-2 bg-amber-50 rounded-lg text-amber-700">
                        <span>🤔 중립 / 질문</span><span id="txtNeu">0%</span>
                    </div>
                    <div class="flex justify-between p-2 bg-rose-50 rounded-lg text-rose-700">
                        <span>😡 비판 / 불만</span><span id="txtNeg">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        
        const HOST_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:8000' 
            : 'https://https://site1-9l0u.onrender.com';

        async function runAnalysis() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const url = document.getElementById('videoUrl').value.trim();
            const sortBy = document.querySelector('input[name="sortBy"]:checked').value;

            if (!apiKey || !url) {
                alert('API 키와 유튜브 URL 주소를 정확하게 입력해 주세요!!!');
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultDashboard').classList.add('hidden');

            try {
                const res = await fetch(`${HOST_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, url: url, sort_by: parseInt(sortBy) })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || '😥분석 중 에러가 발생했습니다.');
                }

                const data = await res.json();

                document.getElementById('resChannel').innerText = data.channel;
                document.getElementById('resTitle').innerText = data.title;
                document.getElementById('analysisReport').innerHTML = marked.parse(data.report);

                document.getElementById('txtPos').innerText = data.chart_data.positive + '%';
                document.getElementById('txtNeu').innerText = data.chart_data.neutral + '%';
                document.getElementById('txtNeg').innerText = data.chart_data.negative + '%';

                if (chartInstance) chartInstance.destroy();
                const ctx = document.getElementById('emotionChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['긍정', '중립', '비판'],
                        datasets: [{
                            data: [data.chart_data.positive, data.chart_data.neutral, data.chart_data.negative],
                            backgroundColor: ['#10b981', '#f59e0b', '#f43f5e'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        cutout: '75%',
                        responsive: true
                    }
                });

                document.getElementById('resultDashboard').classList.remove('hidden');
            } catch (e) {
                alert(e.message);
            } finaly {
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
